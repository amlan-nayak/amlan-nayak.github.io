<footer class="site-footer">
  <div class="container footer-inner">
    <div><a class="footer-name" href="{{ '/' | prepend: site.baseurl }}">{{ site.author.name }}</a><p>Computational biology and animal behavior at Cornell University.</p></div>
    <nav aria-label="Social links"><ul class="footer-links">
      <li><a href="mailto:{{ site.author.email }}">Email</a></li>
      <li><a href="https://github.com/{{ site.author.github }}">GitHub</a></li>
      <li><a href="https://orcid.org/{{ site.author.ORCID }}">ORCID</a></li>
      {% if site.author.linkedin %}<li><a href="https://linkedin.com/in/{{ site.author.linkedin }}">LinkedIn</a></li>{% endif %}
    </ul></nav>
    <p class="footer-meta">© {{ site.time | date: '%Y' }} {{ site.author.name }}</p>
  </div>
</footer>
